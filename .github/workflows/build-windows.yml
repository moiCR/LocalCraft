name: "Build App for Windows"

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example vX.X.X"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: "Build Windows"
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: "Set up Bun"
        uses: oven-sh/setup-bun@v2

      - name: "Setup Rust"
        uses: dtolnay/rust-toolchain@stable

      - name: "Install dependencies"
        run: bun install --frozen-lockfile

      - name: "Load changelog"
        shell: pwsh
        run: |
          "RELEASE_BODY<<EOF" >> $env:GITHUB_ENV
          Get-Content -Raw CHANGELOG.md >> $env:GITHUB_ENV
          "EOF" >> $env:GITHUB_ENV

      - name: "Build App and Upload Release"
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          releaseName: "LocalCraft ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          args: "--target x86_64-pc-windows-msvc"
