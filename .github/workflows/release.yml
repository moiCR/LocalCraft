name: "Release"

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example vX.X.X"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  release:
    name: "Release ${{ matrix.name }}"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows"
            os: windows-latest
            args: "--features updater --config src-tauri/tauri.updater.conf.json --target x86_64-pc-windows-msvc"
          - name: "Linux AppImage"
            os: ubuntu-24.04
            args: "--features updater --config src-tauri/tauri.updater.conf.json --bundles appimage,deb"
    runs-on: ${{ matrix.os }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Install Linux dependencies"
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            desktop-file-utils \
            appstream

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: "Set up Bun"
        uses: oven-sh/setup-bun@v2

      - name: "Setup Rust"
        uses: dtolnay/rust-toolchain@stable

      - name: "Install dependencies"
        run: bun install --frozen-lockfile

      - name: "Load changelog"
        shell: bash
        run: |
          {
            echo "RELEASE_BODY<<EOF"
            cat CHANGELOG.md
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: "Build App and Upload Release"
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_ENABLE_UPDATER: "true"
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          releaseName: "LocalCraft ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
